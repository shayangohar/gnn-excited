model:
  cutoff: 5
  num_blocks: 4
  hidden_channels: 128
  out_emb_channels: 256
  int_emb_size: 64
  basis_emb_size: 16
  num_radial: 6
  num_spherical: 3
  max_num_neighbors: 32
  out_channels: 10

dataset:
  hdf5_path: data/final_all.hdf5
  manifest_path: data/processed/final_all_manifest_s5_dedup.csv
  split_path: data/processed/qcdge_audit/splits.csv
  split_column: scaffold_split
  max_manifest_molecules:
  local_copy: true
  report_subset_metrics: true
  split_seed: 17

targets:
  columns:
    - S1_eV
    - log1p_S1_f
    - S2_eV
    - log1p_S2_f
    - S3_eV
    - log1p_S3_f
    - S4_eV
    - log1p_S4_f
    - S5_eV
    - log1p_S5_f

training:
  device: cuda
  seed: 17
  epochs: 200
  batch_size: 64
  learning_rate: 0.0003
  weight_decay: 0.0001
  max_grad_norm: 1.0
  dataloader:
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 4
  scheduler:
    type: reduce_on_plateau
    mode: min
    factor: 0.5
    patience: 8
    min_lr: 0.000001
  early_stopping_patience: 25
  early_stopping_min_delta: 0.00001
  checkpoint_path: checkpoints/dimenetpp_final_all_s5_clean_scaffold.pt
  metrics_csv_path: runs/dimenetpp_final_all_s5_clean_scaffold.metrics.csv
  summary_json_path: runs/dimenetpp_final_all_s5_clean_scaffold.summary.json

wandb:
  enabled: true
  entity: shayangohar2007-fresno-state
  project: gnn-excited
  name: dimenetpp_final_all_s5_clean_scaffold
  group: final-all-s5-clean-splits
  tags:
    - QCDGE-full
    - S1-S5
    - deduplicated
    - scaffold-split
    - wide
    - gradient-clipping

