dataset:
  hdf5_path: data/A_9.hdf5
  manifest_path: data/processed/a9_manifest_100.csv
  max_manifest_molecules: 100
  split_seed: 17
  train_fraction: 0.8
  val_fraction: 0.1

targets:
  energy: S1_eV
  oscillator: log1p_S1_f

model:
  hidden_channels: 64
  out_channels: 2
  num_blocks: 2
  int_emb_size: 32
  basis_emb_size: 8
  out_emb_channels: 128
  num_spherical: 3
  num_radial: 6
  cutoff: 5.0
  max_num_neighbors: 32

training:
  batch_size: 8
  epochs: 5
  learning_rate: 0.0005
  weight_decay: 0.0
  device: cpu
  checkpoint_path: checkpoints/dimenetpp_a9_small.pt
