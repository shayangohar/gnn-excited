dataset:
  hdf5_path: data/A_9.hdf5
  manifest_path: data/processed/a9_manifest_50000.csv
  max_manifest_molecules: 50000
  split_seed: 17
  train_fraction: 0.8
  val_fraction: 0.1

targets:
  energy: S1_eV
  oscillator: log1p_S1_f

model:
  hidden_channels: 128
  out_channels: 2
  num_blocks: 4
  int_emb_size: 64
  basis_emb_size: 16
  out_emb_channels: 256
  num_spherical: 3
  num_radial: 6
  cutoff: 5.0
  max_num_neighbors: 32

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.0003
  weight_decay: 1.0e-4
  max_grad_norm: 1.0
  device: cuda
  early_stopping_patience: 15
  early_stopping_min_delta: 0.0001
  scheduler:
    type: reduce_on_plateau
    mode: min
    factor: 0.5
    patience: 8
    min_lr: 0.000001
  checkpoint_path: checkpoints/dimenetpp_a9_50k_wide_clip.pt
  metrics_csv_path: runs/dimenetpp_a9_50k_wide_clip.metrics.csv
  summary_json_path: runs/dimenetpp_a9_50k_wide_clip.summary.json
